<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🎾 טניס — בקרת תנועה</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
/* ══ §1 HTML/CSS ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14; --court:#0d1a2e; --neon:#00e5ff; --neon-dim:rgba(0,229,255,.3);
  --net:#ff6b35; --ball:#ffff44; --p1:#00ff88; --p2:#ff44aa;
  --gold:#ffd700; --white:#e8f4ff; --red:#ff4455;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;color:var(--white);user-select:none}

#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

.screen{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  background:radial-gradient(ellipse at 50% 30%,#001830 0%,#080c14 70%);z-index:20}
.screen.active{display:flex}

.title{font-size:60px;font-weight:900;text-align:center;
  background:linear-gradient(135deg,var(--p1) 0%,var(--neon) 50%,var(--p2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.1}
.subtitle{font-size:19px;color:#88aacc;text-align:center}

.btn{min-height:62px;padding:0 38px;font-size:21px;font-weight:800;border:none;
  border-radius:16px;cursor:pointer;transition:transform .1s,box-shadow .1s;
  letter-spacing:.5px;text-decoration:none;display:inline-flex;
  align-items:center;justify-content:center}
.btn:hover{transform:scale(1.05)}
.btn-neon{background:linear-gradient(135deg,#006688,#004466);color:var(--neon);
  border:1.5px solid var(--neon);box-shadow:0 0 20px rgba(0,229,255,.22)}
.btn-pink{background:linear-gradient(135deg,#440022,#220011);color:var(--p2);
  border:1.5px solid var(--p2);box-shadow:0 0 20px rgba(255,68,170,.2)}
.btn-gray{background:#141926;color:#88aacc;border:1.5px solid #2a3a55}
.btn-sm{min-height:46px;font-size:17px;padding:0 22px}

input.room-input{font-size:46px;font-weight:900;text-align:center;letter-spacing:12px;
  width:200px;padding:10px 14px;border:3px solid var(--neon);border-radius:14px;
  background:rgba(0,229,255,.07);color:var(--neon);outline:none;direction:ltr}

#hud{position:fixed;top:0;left:0;right:0;height:62px;
  background:linear-gradient(180deg,rgba(8,12,20,.95) 55%,transparent);
  display:none;align-items:center;justify-content:center;gap:28px;z-index:15;direction:ltr}
#hud.visible{display:flex}
.score-row{font-size:40px;font-weight:900;display:flex;align-items:center;gap:22px}

#back-btn{position:fixed;top:12px;left:16px;padding:8px 20px;border-radius:14px;
  background:rgba(0,229,255,.09);border:1.5px solid rgba(0,229,255,.28);
  color:var(--neon);font-size:14px;font-weight:700;z-index:200;text-decoration:none}

#calib-container{position:relative;margin:0 auto}
#calib-video{display:block;border-radius:12px;border:2px solid rgba(0,229,255,.4);object-fit:cover;transform:scaleX(-1);background:#000}
#calib-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:12px}
</style>
</head>
<body>

<canvas id="c"></canvas>
<video id="feed" autoplay muted playsinline style="position:fixed;top:-9999px;left:-9999px;width:320px;height:240px"></video>
<a id="back-btn" href="../../index.html">← חזור</a>

<div id="screen-lobby" class="screen active">
  <div class="title">🎾 טניס</div>
  <div class="subtitle">קישור בין דורות · אימון תנועה</div>
  <div style="display:flex;gap:18px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-neon" id="btn-create">✨ צור חדר</button>
    <button class="btn btn-pink" id="btn-join">🚀 הצטרף לחדר</button>
  </div>
  <input class="room-input" id="join-input" type="text" maxlength="4" placeholder="0000">
  <div id="room-display" style="display:none; font-size:30px; color:var(--gold)"></div>
  <div id="lobby-status" class="status-msg"></div>
  <div id="lobby-error" class="error-msg"></div>
  <div style="margin-top:4px">
    <button class="btn btn-gray btn-sm" id="btn-solo">תרגול יחיד</button>
  </div>
</div>

<div id="screen-difficulty" class="screen">
  <div class="title" style="font-size:42px">🎯 בחר רמת קושי</div>
  <div style="display:flex;gap:18px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-neon" id="btn-easy">קל</button>
    <button class="btn btn-pink" id="btn-medium">בינוני</button>
    <button class="btn btn-gray" id="btn-hard">קשה</button>
  </div>
</div>

<div id="screen-calib" class="screen">
  <div class="title" style="font-size:42px">🖐 כיול</div>
  <div id="calib-instr" class="subtitle">התחל מצלמה…</div>
  <div id="calib-container">
    <video id="calib-video" autoplay muted playsinline></video>
    <canvas id="calib-overlay"></canvas>
  </div>
  <div id="calib-status"></div>
  <button class="btn btn-gray btn-sm" id="btn-skip-calib">דלג (השתמש בעכבר)</button>
</div>

<div id="screen-gameover" class="screen">
  <div class="title" style="font-size:48px">סיום משחק!</div>
  <div id="go-score" style="font-size:66px; color:var(--gold)">0 : 0</div>
  <button class="btn btn-neon" id="btn-replay">🔄 שחק שוב</button>
</div>

<div id="hud">
  <div class="score-row">
    <span id="hud-p1" style="color:var(--p1)">0</span>
    <span style="color:#3a5060">:</span>
    <span id="hud-p2" style="color:var(--p2)">0</span>
  </div>
  <div id="hud-info" style="position:absolute; right:20px; font-size:12px"></div>
</div>

<script>
'use strict';
// לוגיקה וקבועים מהגרסה המקורית
const COURT_W = 100, COURT_H = 50;
const AX = 0.009, BX = -0.011, AY = 0.0035, BY = 0.012;
const BALL_SPD0 = 22, BALL_SPDMAX = 55, BALL_SPDINC = 1.5;
const STRIKE_THR = 0.018, STRIKE_MULT = 1.5, RW = 8, RH = 14;
const P1_XMIN = 1, P1_XMAX = 46, P2_XMIN = 54, P2_XMAX = 99;
const EMA_POS = 0.22, EMA_VEL = 0.18, CALIB_MS = 1500, CALIB_TOL = 0.20;
const SYNC_MS = 16, WIN_PTS = 7, SERVE_DELAY = 1600;

let canvas, ctx, dpr = 1, appState = 'lobby', isHost = false, myRole = 'p1', aiDifficulty = 'medium';
const ball = { x:50, y:25, vx:0, vy:0, spd:BALL_SPD0, ip:false };
const p1R = {x:10, y:25, vM:0}, p2R = {x:90, y:25, vM:0};
let score = [0, 0], serving = 1, rally = 0, flash = 0, aiTargetY = 25, aiUpdateT = 0;
let hx=.5, hy=.5, hvx=0, hvy=0, phx=.5, phy=.5, hVel=0, cState = 'WAITING', cAlignT = 0, cProg = 0, guestReady = false;
const parts = [], crowdDots = [];
let crowdTick = 0, AC = null, peer=null, dc=null, syncTimer=null, lt=0, raf=null, mpHands=null, mpCam=null;

function toS(cx, cy){ const W=canvas.width/dpr, H=canvas.height/dpr; return { sx: W*.5 + (cx*AX + cy*BX)*H, sy: H*.11 + (cx*AY + cy*BY)*H }; }
function showScr(name){ 
    appState=name; 
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('screen-'+name).classList.add('active');
    document.getElementById('hud').classList.toggle('visible', name==='game');
}

// --- תיקון: פונקציות האתחול והחיבור לכפתורים ---
function initMP(){
    const feedEl=document.getElementById('feed');
    const dispEl=document.getElementById('calib-video');
    mpHands=new Hands({locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    mpHands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:.55, minTrackingConfidence:.50});
    mpHands.onResults(onHR);
    mpCam=new Camera(feedEl,{ onFrame: async()=>{ if(appState==='calib'||appState==='game') await mpHands.send({image:feedEl}); }, width:320, height:240 });
    mpCam.start().then(()=> { 
        dispEl.srcObject=feedEl.srcObject;
        document.getElementById('calib-instr').textContent = 'הנח את היד בתוך העיגול';
    });
}

function onHR(res){
    if(!res.multiHandLandmarks?.length) return;
    const lm=res.multiHandLandmarks[0];
    const rx=1-(lm[0].x+lm[9].x)/2, ry=(lm[0].y+lm[9].y)/2;
    hx=hx*(1-EMA_POS)+rx*EMA_POS; hy=hy*(1-EMA_POS)+ry*EMA_POS;
    if(cState==='WAITING') cState='DETECTING';
    const inZ=Math.abs(rx-.5)<CALIB_TOL&&Math.abs(ry-.5)<CALIB_TOL;
    if(inZ && cState==='DETECTING') { cState='ALIGNING'; cAlignT=Date.now(); }
    if(cState==='ALIGNING'){
        cProg=Math.min(1,(Date.now()-cAlignT)/CALIB_MS);
        if(cProg>=1){ cState='LOCKED'; onLocked(); }
    }
    if(appState==='game' && cState==='LOCKED') {
        const r = myRole==='p1'?p1R:p2R;
        const xm=myRole==='p1'?P1_XMIN:P2_XMIN, xx=myRole==='p1'?P1_XMAX:P2_XMAX;
        r.x=Math.max(xm,Math.min(xx, xm+hx*(xx-xm))); r.y=Math.max(2,Math.min(COURT_H-2, hy*COURT_H));
    }
}

function onLocked(){ showScr('game'); doStart(); }
function doStart(){ score=[0,0]; ball.ip=false; serving=1; setTimeout(serveBall, 1000); }
function serveBall(){ ball.x=serving===1?16:COURT_W-16; ball.y=COURT_H/2; ball.vx=serving===1?25:-25; ball.vy=0; ball.ip=true; ball.spd=BALL_SPD0; }

function loop(ts){
    raf=requestAnimationFrame(loop);
    const dt=Math.min((ts-(lt||ts))/1000,.05); lt=ts;
    if(appState==='game' && ball.ip){
        ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
        if(ball.y<=0||ball.y>=COURT_H) ball.vy*=-1;
        if(ball.x<0){ score[1]++; serving=1; ball.ip=false; setTimeout(serveBall, 1000); }
        if(ball.x>100){ score[0]++; serving=2; ball.ip=false; setTimeout(serveBall, 1000); }
        [p1R, p2R].forEach((r)=>{
            if(Math.abs(ball.x-r.x)<4 && Math.abs(ball.y-r.y)<8){ ball.vx*=-1.1; ball.vy=(ball.y-r.y)*2; }
        });
        document.getElementById('hud-p1').textContent=score[0];
        document.getElementById('hud-p2').textContent=score[1];
    }
    draw(ts);
}

function draw(ts){
    const W=canvas.width/dpr, H=canvas.height/dpr;
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#00e5ff'; ctx.lineWidth=2; ctx.strokeRect(W*0.1, H*0.1, W*0.8, H*0.8);
    if(appState==='game'){
        const bS = toS(ball.x, ball.y);
        ctx.fillStyle='#ffff44'; ctx.beginPath(); ctx.arc(bS.sx, bS.sy, 8, 0, Math.PI*2); ctx.fill();
        [p1R, p2R].forEach(r=>{
            const rS = toS(r.x, r.y);
            ctx.fillStyle=r===p1R?'#00ff88':'#ff44aa'; ctx.fillRect(rS.sx-8, rS.sy-25, 16, 50);
        });
    }
}

// --- אירועי כפתורים (התיקון) ---
window.addEventListener('load',()=>{
    canvas=document.getElementById('c'); ctx=canvas.getContext('2d');
    dpr=window.devicePixelRatio||1; canvas.width=window.innerWidth*dpr; canvas.height=window.innerHeight*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    
    document.getElementById('btn-solo').onclick = () => showScr('difficulty');
    
    ['btn-easy', 'btn-medium', 'btn-hard'].forEach(id => {
        document.getElementById(id).onclick = () => {
            aiDifficulty = id.split('-')[1];
            showScr('calib');
            initMP();
        };
    });

    document.getElementById('btn-skip-calib').onclick = () => {
        cState='LOCKED'; showScr('game'); doStart();
    };

    loop(performance.now());
});
</script>
</body>
</html>
