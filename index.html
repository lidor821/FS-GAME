<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עולם המשחקים של לידור</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Assistant', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; overflow: hidden;
        }
        h1 {
            font-size: 3rem; margin-bottom: 50px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hub-container { display: flex; gap: 40px; z-index: 2; }
        .game-card {
            width: 280px; height: 380px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-decoration: none;
            color: white; transition: all 0.4s ease;
        }
        .game-card:hover { transform: translateY(-15px); border-color: #a78bfa; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .icon { font-size: 70px; margin-bottom: 20px; }
        .btn-play { margin-top: 20px; padding: 8px 25px; background: linear-gradient(45deg, #7c3aed, #db2777); border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>מה משחקים היום?</h1>
    <div class="hub-container">
        <a href="games/space/index.html" class="game-card">
            <div class="icon">🚀</div>
            <h2>מסע הגלקסיה</h2>
            <p>משחק חלליות שיתופי</p>
            <div class="btn-play">כניסה</div>
        </a>
        <a href="games/tennis/index.html" class="game-card">
            <div class="icon">🎾</div>
            <h2>טניס מצלמה</h2>
            <p>משחק תנועה עם סבא</p>
            <div class="btn-play">כניסה</div>
        </a>
    </div>
</body>
</html>
