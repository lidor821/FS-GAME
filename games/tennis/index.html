<style>
/* ══ §1 HTML/CSS ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14; --court:#0d1a2e; --neon:#00e5ff; --neon-dim:rgba(0,229,255,.3);
  --net:#ff6b35; --ball:#ffff44; --p1:#00ff88; --p2:#ff44aa;
  --gold:#ffd700; --white:#e8f4ff; --red:#ff4455;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;color:var(--white);user-select:none}

#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  background:radial-gradient(ellipse at 50% 30%,#001830 0%,#080c14 70%);z-index:20}
.screen.active{display:flex}

/* ── Title ── */
.title{font-size:60px;font-weight:900;text-align:center;
  background:linear-gradient(135deg,var(--p1) 0%,var(--neon) 50%,var(--p2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.1}
.subtitle{font-size:19px;color:#88aacc;text-align:center}

/* ── Buttons ── */
.btn{min-height:62px;padding:0 38px;font-size:21px;font-weight:800;border:none;
  border-radius:16px;cursor:pointer;transition:transform .1s,box-shadow .1s;
  letter-spacing:.5px;text-decoration:none;display:inline-flex;
  align-items:center;justify-content:center}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.97)}
.btn-neon{background:linear-gradient(135deg,#006688,#004466);color:var(--neon);
  border:1.5px solid var(--neon);box-shadow:0 0 20px rgba(0,229,255,.22)}
.btn-neon:hover{box-shadow:0 0 36px rgba(0,229,255,.55)}
.btn-pink{background:linear-gradient(135deg,#440022,#220011);color:var(--p2);
  border:1.5px solid var(--p2);box-shadow:0 0 20px rgba(255,68,170,.2)}
.btn-pink:hover{box-shadow:0 0 36px rgba(255,68,170,.5)}
.btn-gray{background:#141926;color:#88aacc;border:1.5px solid #2a3a55}
.btn-sm{min-height:46px;font-size:17px;padding:0 22px}

/* ── Inputs ── */
input.room-input{font-size:46px;font-weight:900;text-align:center;letter-spacing:12px;
  width:200px;padding:10px 14px;border:3px solid var(--neon);border-radius:14px;
  background:rgba(0,229,255,.07);color:var(--neon);outline:none;
  caret-color:var(--neon);direction:ltr}
input.room-input::placeholder{color:rgba(0,229,255,.3);font-size:26px;letter-spacing:6px}
input.room-input:focus{border-color:var(--p2);color:var(--p2)}

/* ── Lobby extras ── */
.status-msg{font-size:17px;color:#88aacc;text-align:center;min-height:22px}
.error-msg {font-size:17px;color:var(--red); text-align:center;min-height:22px}
#room-display{font-size:54px;font-weight:900;color:var(--gold);
  letter-spacing:18px;direction:ltr;display:none}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;height:62px;
  background:linear-gradient(180deg,rgba(8,12,20,.95) 55%,transparent);
  display:none;align-items:center;justify-content:center;gap:28px;z-index:15;direction:ltr}
#hud.visible{display:flex}
.score-row{font-size:40px;font-weight:900;display:flex;align-items:center;gap:22px}
.sp1{color:var(--p1);text-shadow:0 0 16px var(--p1)}
.sp2{color:var(--p2);text-shadow:0 0 16px var(--p2)}
.ssep{color:#3a5060;font-size:30px}
#hud-info{position:absolute;right:16px;font-size:13px;color:#556677}

/* ── Back btn ── */
#back-btn{position:fixed;top:12px;left:16px;padding:8px 20px;border-radius:14px;
  background:rgba(0,229,255,.09);border:1.5px solid rgba(0,229,255,.28);
  color:var(--neon);font-size:14px;font-weight:700;z-index:200;
  text-decoration:none;transition:background .15s,border-color .15s}
#back-btn:hover{background:rgba(0,229,255,.22);border-color:var(--neon)}

/* ── Conn status ── */
#conn-status{position:fixed;top:12px;right:16px;font-size:13px;
  padding:4px 14px;border-radius:20px;background:rgba(0,0,0,.75);z-index:100;display:none}

/* ── Calibration ── */
#calib-container{position:relative;margin:0 auto}
#calib-container video{display:block;border-radius:12px;
  border:2px solid rgba(0,229,255,.4);object-fit:cover;
  transform:scaleX(-1);background:#000}
#calib-overlay{position:absolute;top:0;left:0;
  width:100%;height:100%;pointer-events:none;border-radius:12px}

/* ── Game Over ── */
#go-score{font-size:66px;font-weight:900;color:var(--gold);
  letter-spacing:12px;direction:ltr;text-shadow:0 0 30px rgba(255,215,0,.5)}
</style>

<!-- ══ HUD ══ -->

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
// §2  CONSTANTS
// ══════════════════════════════════════════════════════════════════

const COURT_W = 100, COURT_H = 50;

// Top-down rectangular projection constants
// Court fills 95% screen width, 82% screen height (below HUD)
const COURT_OX_FRAC = 0.025;  // left/right margin = 2.5% each
const COURT_OY_FRAC = 0.11;   // top margin (below HUD)
const COURT_PW_FRAC = 0.95;   // court pixel width as fraction of W
const COURT_PH_FRAC = 0.82;   // court pixel height as fraction of H

const BALL_SPD0   = 32;   // puck speed at serve
const BALL_SPDMAX = 80;
const BALL_SPDINC = 2.0;
const STRIKE_THR  = 0.016; // smoothed hand-vel magnitude → boost
const STRIKE_MULT = 1.6;
const RW = 6, RH = 6;       // pusher radius (circular)

const P1_XMIN = 1,  P1_XMAX = 46;
const P2_XMIN = 54, P2_XMAX = 99;

const GOAL_HALF = 8;        // half-height of goal slot in court units

const EMA_POS  = 0.48;
const EMA_VEL  = 0.38;
const CALIB_MS = 1500;
const CALIB_TOL= 0.20;   // fraction-of-frame for the lock zone

const SYNC_MS      = 16;
const WIN_PTS      = 7;
const SERVE_DELAY  = 1600; // ms before ball launches after a point

// ══════════════════════════════════════════════════════════════════
// §3  GAME STATE
// ══════════════════════════════════════════════════════════════════

let canvas, ctx, dpr = 1;
let appState = 'lobby';
let isHost = false, myRole = 'p1';

const ball  = { x:50, y:25, vx:0, vy:0, spd:BALL_SPD0, ip:false };
const p1R   = mkR(10, 25);
const p2R   = mkR(90, 25);
let score   = [0, 0], serving = 1, rally = 0;
let flash   = 0;         // ms remaining for white flash

// AI
let aiTargetX = 50, aiTargetY = 25, aiUpdateT = 0;

// Hit feedback
let hitTimerP1 = 0, hitTimerP2 = 0;

// Hand-tracking state
let hx=.5, hy=.5;        // EMA position
let hvx=0, hvy=0;        // EMA velocity
let phx=.5, phy=.5;      // previous raw pos
let hVel=0;

// Calibration
let cState = 'WAITING';  // WAITING|DETECTING|ALIGNING|LOCKED
let cAlignT = 0, cProg = 0;
let guestReady = false;

// Visual
const parts = [];        // particles[]
const crowdDots = [];
let crowdTick = 0;

// Audio
let AC = null;

// Network
let peer=null, dc=null, syncTimer=null;

let aiDifficulty = 'medium';
let raf, lt;

function mkR(x,y){ return {x,y,vM:0}; }

// ══════════════════════════════════════════════════════════════════
// §4  TOP-DOWN PROJECTION
// ══════════════════════════════════════════════════════════════════

function toS(cx, cy){
  const W=canvas.width/dpr, H=canvas.height/dpr;
  const pw=W*COURT_PW_FRAC, ph=H*COURT_PH_FRAC;
  const ox=W*COURT_OX_FRAC, oy=H*COURT_OY_FRAC;
  return {
    sx: ox + (cx/COURT_W)*pw,
    sy: oy + (cy/COURT_H)*ph
  };
}

// Helper: returns pixel rect of the court for use in drawing helpers
function courtRect(){
  const W=canvas.width/dpr, H=canvas.height/dpr;
  return {
    x: W*COURT_OX_FRAC, y: H*COURT_OY_FRAC,
    w: W*COURT_PW_FRAC, h: H*COURT_PH_FRAC
  };
}

// ══════════════════════════════════════════════════════════════════
// §5  AUDIO ENGINE
// ══════════════════════════════════════════════════════════════════

function initAC(){ try{ AC=new AudioContext(); }catch(e){} }
function wakeAC(){ if(AC&&AC.state==='suspended') AC.resume(); }

function beep(f0,f1,dur,type,vol){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type||'sine';
  o.frequency.setValueAtTime(f0,AC.currentTime);
  if(f1!==f0) o.frequency.exponentialRampToValueAtTime(f1,AC.currentTime+dur*.45);
  g.gain.setValueAtTime(vol||.2,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.start(); o.stop(AC.currentTime+dur);
}

function sndHit()  { wakeAC(); beep(360,820,.10,'sine',.22); }
function sndScore(){
  wakeAC();
  [523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,f,.15,'sine',.17),i*110));
}
function sndEnd(win){
  wakeAC();
  const fs=win?[523,659,784,1047]:[784,659,523,392];
  fs.forEach((f,i)=>setTimeout(()=>beep(f,f,.20,'triangle',.15),i*160));
}

// ══════════════════════════════════════════════════════════════════
// §6  MEDIAPIPE / CALIBRATION
// ══════════════════════════════════════════════════════════════════

let mpHands=null, mpCam=null;

function initMP(){
  const feedEl=document.getElementById('feed');
  const dispEl=document.getElementById('calib-video');

  // Size calib container to video element
  const cw=Math.min(320, window.innerWidth*.9);
  const ch=Math.round(cw*.75);
  const cont=document.getElementById('calib-container');
  cont.style.width=cw+'px'; cont.style.height=ch+'px';
  dispEl.style.width=cw+'px'; dispEl.style.height=ch+'px';

  setCalibInstr('אפשר גישה למצלמה כדי להמשיך');

  mpHands=new Hands({
    locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  mpHands.setOptions({
    maxNumHands:1, modelComplexity:0,
    minDetectionConfidence:.55, minTrackingConfidence:.50
  });
  mpHands.onResults(onHR);

  mpCam=new Camera(feedEl,{
    onFrame: async()=>{
      if(appState==='calib'||appState==='game')
        await mpHands.send({image:feedEl});
    },
    width:320, height:240
  });

  mpCam.start().then(()=>{
    if(feedEl.srcObject){
      dispEl.srcObject=feedEl.srcObject;
      dispEl.play().catch(()=>{});
    }
    setCalibInstr('החזק את היד הפתוחה בתוך העיגול');
  }).catch(err=>{
    console.warn('Camera:',err);
    setCalibInstr('אין מצלמה — השתמש בעכבר לשליטה במחבט');
    setCalibMsg('לחץ דלג כדי להמשיך');
  });
}

function onHR(res){
  if(!res.multiHandLandmarks||!res.multiHandLandmarks.length){
    if(cState==='ALIGNING'){ cState='DETECTING'; cProg=0; }
    return;
  }
  if(cState==='WAITING') cState='DETECTING';

  const lm=res.multiHandLandmarks[0];
  const rx=1-(lm[0].x+lm[9].x)/2;  // mirrored x
  const ry=  (lm[0].y+lm[9].y)/2;

  hx =hx *(1-EMA_POS)+rx*EMA_POS;
  hy =hy *(1-EMA_POS)+ry*EMA_POS;
  hvx=hvx*(1-EMA_VEL)+(rx-phx)*EMA_VEL;
  hvy=hvy*(1-EMA_VEL)+(ry-phy)*EMA_VEL;
  hVel=Math.hypot(hvx,hvy);
  phx=rx; phy=ry;

  const inZ=Math.abs(rx-.5)<CALIB_TOL&&Math.abs(ry-.5)<CALIB_TOL;

  if(cState==='DETECTING'){
    if(inZ){ cState='ALIGNING'; cAlignT=Date.now(); }
  } else if(cState==='ALIGNING'){
    if(!inZ){ cState='DETECTING'; cProg=0; }
    else{
      cProg=Math.min(1,(Date.now()-cAlignT)/CALIB_MS);
      if(cProg>=1){ cState='LOCKED'; onLocked(); }
    }
  }

  if(appState==='game'&&cState==='LOCKED') handToRacket();
}

function handToRacket(){
  const isP1=myRole==='p1';
  const xm=isP1?P1_XMIN:P2_XMIN, xx=isP1?P1_XMAX:P2_XMAX;
  const r=isP1?p1R:p2R;
  r.x=Math.max(xm,Math.min(xx, xm+hx*(xx-xm)));
  r.y=Math.max(2, Math.min(COURT_H-2, hy*COURT_H));
  r.vM=hVel;
  if(!isHost) snd({type:'racket',x:r.x,y:r.y,vM:r.vM});
}

// Mouse/touch fallback (used when camera unavailable or skipped)
function ptrToRacket(normX, normY){
  const isP1=myRole==='p1';
  const xm=isP1?P1_XMIN:P2_XMIN, xx=isP1?P1_XMAX:P2_XMAX;
  const r=isP1?p1R:p2R;
  const px=r.x, py=r.y;
  r.x=Math.max(xm,Math.min(xx, xm+normX*(xx-xm)));
  r.y=Math.max(2, Math.min(COURT_H-2, normY*COURT_H));
  r.vM=Math.hypot(r.x-px,r.y-py)*.05;
  if(!isHost) snd({type:'racket',x:r.x,y:r.y,vM:r.vM});
}

function onLocked(){
  setCalibMsg('🔒 נעול! מתחיל…');
  document.getElementById('btn-skip-calib').style.display='none';
  setTimeout(()=>{
    if(isHost){
      if(!dc||!dc.open){ doStart(); return; } // solo
      snd({type:'hostDone'});
      if(guestReady) bothDone();
    } else {
      snd({type:'guestDone'});
    }
  }, 600);
}

function bothDone(){
  if(isHost) snd({type:'startGame'});
  doStart();
}

function setCalibInstr(t){ const e=document.getElementById('calib-instr'); if(e) e.textContent=t; }
function setCalibMsg(t)  { const e=document.getElementById('calib-status'); if(e) e.textContent=t; }

// ── Calibration overlay ──
function drawCalibOverlay(){
  const oc=document.getElementById('calib-overlay');
  if(!oc||!oc.offsetWidth) return;
  const W=oc.width=oc.offsetWidth, H=oc.height=oc.offsetHeight;
  const cc=oc.getContext('2d');
  cc.clearRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  const zR=Math.min(W,H)*CALIB_TOL*.9;
  const locked=(cState==='LOCKED');
  const aligning=(cState==='ALIGNING');

  // Dark vignette outside zone
  cc.save();
  cc.fillStyle='rgba(0,0,0,.38)';
  cc.fillRect(0,0,W,H);
  cc.globalCompositeOperation='destination-out';
  cc.beginPath(); cc.arc(cx,cy,zR*1.5,0,Math.PI*2); cc.fill();
  cc.globalCompositeOperation='source-over';
  cc.restore();

  // Zone ring
  const ringCol=locked?'#00ff88':aligning?'#00e5ff':'rgba(0,229,255,.5)';
  cc.save();
  cc.strokeStyle=ringCol; cc.lineWidth=locked?3:2;
  cc.shadowColor=ringCol; cc.shadowBlur=locked?22:10;
  if(cState==='DETECTING'||cState==='WAITING') cc.setLineDash([6,5]);
  cc.beginPath(); cc.arc(cx,cy,zR,0,Math.PI*2); cc.stroke();
  cc.setLineDash([]);
  cc.restore();

  // Progress arc
  if(aligning&&cProg>0){
    cc.save();
    cc.strokeStyle='#00e5ff'; cc.lineWidth=4; cc.lineCap='round';
    cc.shadowColor='#00e5ff'; cc.shadowBlur=18;
    cc.beginPath();
    cc.arc(cx,cy,zR+9,-Math.PI/2,-Math.PI/2+cProg*Math.PI*2);
    cc.stroke();
    cc.restore();
  }

  // Label below ring
  cc.save();
  cc.textAlign='center';
  const fs=Math.round(Math.min(W,H)*.055);
  cc.font=`bold ${fs}px system-ui`;
  if(locked){
    cc.fillStyle='#00ff88'; cc.shadowColor='#00ff88'; cc.shadowBlur=18;
    cc.fillText('נעול ✓', cx, cy+zR+fs+6);
    // Checkmark
    cc.strokeStyle='#00ff88'; cc.lineWidth=3; cc.lineCap='round'; cc.lineJoin='round';
    cc.beginPath();
    cc.moveTo(cx-zR*.38, cy+4);
    cc.lineTo(cx-zR*.1,  cy+zR*.32);
    cc.lineTo(cx+zR*.45, cy-zR*.28);
    cc.stroke();
  } else if(aligning){
    cc.fillStyle='#00e5ff';
    cc.fillText('החזק ללא תנועה…', cx, cy+zR+fs+6);
  } else if(cState==='DETECTING'){
    cc.fillStyle='rgba(0,229,255,.75)';
    cc.fillText('הזז יד לכאן', cx, cy+zR+fs+6);
  } else {
    cc.fillStyle='rgba(200,220,240,.6)';
    cc.fillText('הראה את היד', cx, cy+zR+fs+6);
  }
  cc.restore();

  // Silhouette
  cc.save();
  cc.strokeStyle='#ffffff'; cc.lineWidth=3; cc.globalAlpha=0.4;
  cc.beginPath();
  cc.arc(cx, cy, zR*0.4, 0, Math.PI*2); // palm
  cc.moveTo(cx - zR*0.2, cy + zR*0.1);
  cc.lineTo(cx - zR*0.3, cy - zR*0.3); // thumb
  cc.moveTo(cx + zR*0.1, cy + zR*0.2);
  cc.lineTo(cx + zR*0.2, cy - zR*0.2); // fingers
  cc.moveTo(cx + zR*0.25, cy + zR*0.15);
  cc.lineTo(cx + zR*0.35, cy - zR*0.25);
  cc.stroke();
  cc.restore();
}

// ══════════════════════════════════════════════════════════════════
// §7  NETWORKING
// ══════════════════════════════════════════════════════════════════

function snd(obj){ if(dc&&dc.open) try{ dc.send(obj); }catch(e){} }

function connSt(t,c){ const e=document.getElementById('conn-status');
  e.textContent=t; e.style.color=c||'#00e5ff'; e.style.display=t?'block':'none'; }
function lobSt(t)  { document.getElementById('lobby-status').textContent=t; }
function lobErr(t) { document.getElementById('lobby-error').textContent=t; }

function createRoom(){
  wakeAC(); lobErr('');
  const code=String(1000+Math.floor(Math.random()*9000));
  isHost=true; myRole='p1';
  lobSt('מתחבר…');
  peer=new Peer('tennismatch-'+code,{debug:0});

  peer.on('open',()=>{
    document.getElementById('room-display').style.display='block';
    document.getElementById('room-display').textContent=code;
    lobSt('שתף את הקוד הזה עם היריב');
    connSt('חדר: '+code,'#00e5ff');
  });
  peer.on('error',e=>{
    if(e.type==='unavailable-id'){ lobErr('הקוד תפוס — נסה שוב'); peer.destroy(); peer=null; }
    else lobErr('שגיאת רשת: '+e.type);
  });
  peer.on('connection',conn=>{
    dc=conn; wireConn();
    lobSt('היריב התחבר! מתחיל כיול…');
    setTimeout(()=>{ snd({type:'beginCalib'}); showScr('calib'); initMP(); }, 700);
  });
}

function joinRoom(){
  wakeAC(); lobErr('');
  const code=document.getElementById('join-input').value.trim();
  if(code.length!==4){ lobErr('הכנס את קוד החדר בן 4 ספרות'); return; }
  isHost=false; myRole='p2';
  lobSt('מתחבר…');
  peer=new Peer({debug:0});
  peer.on('open',()=>{ dc=peer.connect('tennismatch-'+code,{reliable:true}); wireConn(); });
  peer.on('error',e=>lobErr('לא הצלח להתחבר: '+e.type));
}

function wireConn(){
  dc.on('open',()=>{
    if(!isHost){ lobSt('מחובר! ממתין למארח…'); connSt('✓ מחובר','#00ff88'); }
  });
  dc.on('data',onMsg);
  dc.on('close',()=>connSt('החיבור נותק','#ff4455'));
  dc.on('error',()=>connSt('שגיאה ברשת','#ff4455'));
}

function onMsg(m){
  switch(m.type){
    case 'beginCalib':   showScr('calib'); initMP(); break;
    case 'guestDone':    guestReady=true; if(cState==='LOCKED') bothDone(); break;
    case 'hostDone':     if(cState==='LOCKED') snd({type:'guestDone'}); break;
    case 'startGame':    doStart(); break;
    case 'racket':
      if(isHost){
        p2R.x=Math.max(P2_XMIN,Math.min(P2_XMAX,m.x));
        p2R.y=Math.max(2,Math.min(COURT_H-2,m.y));
        p2R.vM=m.vM||0;
      } break;
    case 'state':  if(!isHost) applySnap(m.g); break;
    case 'point':  if(!isHost){ score=m.s; updHUD(); } break;
    case 'gameover': if(!isHost) showGO(m.w,m.s); break;
  }
}

function startSync(){
  clearInterval(syncTimer);
  syncTimer=setInterval(()=>{
    if(isHost&&dc?.open&&appState==='game') snd({type:'state',g:snap()});
  }, SYNC_MS);
}

function snap(){
  return {
    b:{x:ball.x,y:ball.y,vx:ball.vx,vy:ball.vy,ip:ball.ip},
    r1:{x:p1R.x,y:p1R.y}, r2:{x:p2R.x,y:p2R.y},
    s:[...score], fl:flash>0
  };
}
function applySnap(g){
  ball.x=g.b.x; ball.y=g.b.y; ball.vx=g.b.vx; ball.vy=g.b.vy; ball.ip=g.b.ip;
  p1R.x=g.r1.x; p1R.y=g.r1.y;
  p2R.x=g.r2.x; p2R.y=g.r2.y;
  score=g.s; if(g.fl&&flash<=0) flash=60;
  updHUD();
}

// ══════════════════════════════════════════════════════════════════
// §8  PHYSICS  (host only)
// ══════════════════════════════════════════════════════════════════

function updBall(dt){
  if(!ball.ip) return;
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;

  if(ball.y<=0)       { ball.y=0;       ball.vy= Math.abs(ball.vy); sndHit(); }
  if(ball.y>=COURT_H) { ball.y=COURT_H; ball.vy=-Math.abs(ball.vy); sndHit(); }

  // Side walls: score only through goal slot, bounce elsewhere
  if(ball.x<=0){
    if(Math.abs(ball.y-COURT_H/2)<GOAL_HALF){ ptScore(2); return; }
    ball.x=0; ball.vx=Math.abs(ball.vx); sndHit();
  }
  if(ball.x>=COURT_W){
    if(Math.abs(ball.y-COURT_H/2)<GOAL_HALF){ ptScore(1); return; }
    ball.x=COURT_W; ball.vx=-Math.abs(ball.vx); sndHit();
  }

  hitR(p1R,1);
  hitR(p2R,2);
}

function hitR(r,pn){
  const dx=ball.x-r.x, dy=ball.y-r.y;
  if(Math.abs(dx)>RW/2+2||Math.abs(dy)>RH/2+2) return;

  ball.vx= pn===1 ? Math.abs(ball.vx) : -Math.abs(ball.vx);
  ball.vy+= (dy/(RH/2))*5;   // spin component

  if(r.vM>STRIKE_THR){
    ball.spd=Math.min(ball.spd*STRIKE_MULT, BALL_SPDMAX);
    const extra = Math.min((r.vM - STRIKE_THR) * 140, 18);
    ball.spd=Math.min(ball.spd + extra, BALL_SPDMAX);
  } else {
    ball.spd=Math.min(ball.spd+BALL_SPDINC, BALL_SPDMAX);
  }

  const a=Math.atan2(ball.vy,ball.vx);
  ball.vx=Math.cos(a)*ball.spd;
  ball.vy=Math.sin(a)*ball.spd;

  mkHit(ball.x,ball.y,pn);
  rally++;
}

function ptScore(pn){
  ball.ip=false;
  score[pn-1]++; rally=0; ball.spd=BALL_SPD0; serving=pn;
  wakeAC(); beep(600,1000,.25,'triangle',.3); // cheer
  sndScore(); updHUD();
  if(isHost) snd({type:'point',s:[...score],p:pn});

  if(score[0]>=WIN_PTS||score[1]>=WIN_PTS){
    setTimeout(()=>{
      const w=score[0]>=WIN_PTS?1:2;
      w===(myRole==='p1'?1:2) ? sndEnd(true) : sndEnd(false);
      if(isHost) snd({type:'gameover',w,s:[...score]});
      showGO(w,score);
    }, 900);
  } else {
    setTimeout(serveBall, SERVE_DELAY);
  }
}

function serveBall(){
  if(appState!=='game') return;
  ball.x=COURT_W/2; ball.y=COURT_H/2;
  ball.spd=BALL_SPD0;
  const a=(Math.random()*.7-.35);
  const dir=serving===1?1:-1;
  ball.vx=Math.cos(a)*BALL_SPD0*dir;
  ball.vy=Math.sin(a)*BALL_SPD0;
  ball.ip=true;
}

// ══════════════════════════════════════════════════════════════════
// §9  PARTICLES
// ══════════════════════════════════════════════════════════════════

function mkHit(cx,cy,pn){
  flash=75; sndHit();
  if(pn===1) hitTimerP1 = 10; else hitTimerP2 = 10;
  // White/blue mechanical sparks for air hockey impact
  const cols=['#ffffff','#aaddff','#ffeeaa'];
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, s=8+Math.random()*22;
    const col=cols[Math.floor(Math.random()*cols.length)];
    parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,dc:.04+Math.random()*.05,col,r:1+Math.random()*3});
  }
}

function updParts(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.90; p.vy*=0.90;  // air friction, no gravity (top-down)
    p.life-=p.dc;
    if(p.life<=0) parts.splice(i,1);
  }
}

function updAI(dt){
  if(!isHost || dc) return;
  aiUpdateT += dt;
  const updateInt = aiDifficulty==='easy'?2.2: aiDifficulty==='medium'?1.0:0.45;
  if(aiUpdateT >= updateInt){
    aiUpdateT = 0;
    if(ball.vx > 0){
      const predicted = predictBallYAtP2();
      const spread = aiDifficulty==='hard'?2: aiDifficulty==='medium'?5:10;
      aiTargetY = predicted + (Math.random()-0.5)*spread;
      aiTargetX = 75 + (Math.random()-0.5)*40;
      if(aiDifficulty==='easy' && Math.random()<0.22){
        aiTargetY = COURT_H*0.5 + (Math.random()-0.5)*15;
      }
    } else {
      aiTargetX = 85;
      aiTargetY = COURT_H*0.52 + (Math.random()-0.5)*(aiDifficulty==='hard'?4:8);
    }
  }
  const dx = aiTargetX - p2R.x;
  const dy = aiTargetY - p2R.y;
  const speed = aiDifficulty==='easy'?22: aiDifficulty==='medium'?44:72;
  const dist = Math.hypot(dx,dy);
  if(dist > 1){
    p2R.x += (dx/dist)*speed*dt;
    p2R.y += (dy/dist)*speed*dt;
    p2R.x = Math.max(P2_XMIN,Math.min(P2_XMAX,p2R.x));
    p2R.y = Math.max(2,Math.min(COURT_H-2,p2R.y));
  }
}

function predictBallYAtP2(){
  let px = ball.x, py = ball.y;
  let vx = ball.vx, vy = ball.vy;
  const targetX = P2_XMIN;
  if(vx <= 0) return COURT_H/2;
  let t = (targetX - px) / vx;
  let y = py + vy * t;
  while(y < 0 || y > COURT_H){
    if(y < 0) y = -y;
    if(y > COURT_H) y = COURT_H*2 - y;
  }
  return Math.max(3, Math.min(COURT_H-3, y));
}

// ══════════════════════════════════════════════════════════════════
// §10  RENDERING
// ══════════════════════════════════════════════════════════════════

function render(ts){
  const W=canvas.width/dpr, H=canvas.height/dpr;
  ctx.clearRect(0,0,W,H);
  drawBg(W,H);
  drawCourtFill();
  drawCourtLines();
  drawCrowd();
  drawServiceLines();
  drawNet();

  if(appState==='game'){
    drawShadows();
    drawParts();
    drawRacket(p1R,'#00ff88',1);
    drawRacket(p2R,'#ff44aa',2);
    if(ball.ip) drawBall();
    drawFlash(W,H);
  } else {
    drawIdleBall(ts);
  }
}

function drawBg(W,H){
  // Deep arena darkness
  ctx.fillStyle='#04070e'; ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.globalCompositeOperation='lighter';
  // Arena overhead lights — four corner spots
  [[0.15,0.15],[0.85,0.15],[0.15,0.85],[0.85,0.85]].forEach(([fx,fy])=>{
    const lg=ctx.createRadialGradient(W*fx,H*fy,0,W*fx,H*fy,W*0.45);
    lg.addColorStop(0,'rgba(40,80,160,0.07)');
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,W,H);
  });
  // Top center warm wash
  const top=ctx.createRadialGradient(W*.5,0,0,W*.5,0,W*.6);
  top.addColorStop(0,'rgba(80,120,220,0.08)');
  top.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=top; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function drawCourtFill(){
  const r=courtRect();
  ctx.save();
  ctx.beginPath(); ctx.rect(r.x,r.y,r.w,r.h); ctx.closePath();
  // Polished dark-blue air hockey table surface
  const g=ctx.createLinearGradient(r.x,r.y,r.x+r.w,r.y+r.h);
  g.addColorStop(0,'#0c1828'); g.addColorStop(0.5,'#111e32'); g.addColorStop(1,'#0c1828');
  ctx.fillStyle=g; ctx.fill();
  // Subtle gloss sheen across the top half
  ctx.clip();
  const sheen=ctx.createLinearGradient(r.x,r.y,r.x,r.y+r.h*.5);
  sheen.addColorStop(0,'rgba(255,255,255,0.04)');
  sheen.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.restore();
}

function coLine(x0,y0,x1,y1,col,gc){
  const a=toS(x0,y0), b=toS(x1,y1);
  ctx.save();
  ctx.shadowColor=gc||col; ctx.shadowBlur=10;
  ctx.strokeStyle=gc||col; ctx.lineWidth=5; ctx.globalAlpha=.28;
  ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
  ctx.globalAlpha=1; ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
  ctx.restore();
}

function drawCourtLines(){
  const c='#3a6a90', g='rgba(60,120,160,.7)';
  // Top and bottom full walls
  coLine(0,0,COURT_W,0,c,g);
  coLine(0,COURT_H,COURT_W,COURT_H,c,g);
  // Left wall — two segments with goal gap in the middle
  coLine(0,0,                    0,COURT_H/2-GOAL_HALF, c,g);
  coLine(0,COURT_H/2+GOAL_HALF,  0,COURT_H,             c,g);
  // Right wall
  coLine(COURT_W,0,                   COURT_W,COURT_H/2-GOAL_HALF, c,g);
  coLine(COURT_W,COURT_H/2+GOAL_HALF, COURT_W,COURT_H,             c,g);
}

function drawCrowd(){
  ctx.save();
  crowdDots.forEach(dot=>{
    const pulse = 0.25 + Math.sin(crowdTick + dot.phase)*0.12;
    ctx.fillStyle=`${dot.col||'rgba(255,255,255,'}${Math.max(0.12,dot.alpha*pulse)})`;
    ctx.beginPath(); ctx.arc(dot.x,dot.y,dot.r+(pulse*0.9),0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function initCrowd(){
  crowdDots.length = 0;
  const W=canvas.width/dpr, H=canvas.height/dpr;
  const r=courtRect();
  // place crowd in the 4 gutters surrounding the court
  for(let i=0;i<120;i++){
    let x, y;
    const side = i % 4;
    if(side===0){ // top gutter
      x = r.x + Math.random()*r.w;
      y = Math.random()*(r.y - 4) + 2;
    } else if(side===1){ // bottom gutter
      x = r.x + Math.random()*r.w;
      y = r.y + r.h + Math.random()*(H - r.y - r.h - 4) + 2;
    } else if(side===2){ // left gutter
      x = Math.random()*(r.x - 2) + 1;
      y = r.y + Math.random()*r.h;
    } else { // right gutter
      x = r.x + r.w + Math.random()*(W - r.x - r.w - 2) + 1;
      y = r.y + Math.random()*r.h;
    }
    const crowdCols=['rgba(255,255,255,','rgba(255,180,60,','rgba(80,200,255,','rgba(255,80,100,'];
    const col=crowdCols[Math.floor(Math.random()*crowdCols.length)];
    crowdDots.push({x,y,r:1+Math.random()*2.5,alpha:0.12+Math.random()*0.22,phase:Math.random()*Math.PI*2,col});
  }
}
function drawServiceLines(){
  const cr=courtRect();
  const {sx:cx,sy:cy}=toS(COURT_W/2,COURT_H/2);

  // ── Center circle ──
  const circR=toS(COURT_W/2+9,COURT_H/2).sx-cx;
  ctx.save();
  ctx.strokeStyle='rgba(220,40,40,.85)'; ctx.lineWidth=2.5;
  ctx.shadowColor='#ff2222'; ctx.shadowBlur=16;
  ctx.beginPath(); ctx.arc(cx,cy,circR,0,Math.PI*2); ctx.stroke();
  // tiny center dot
  ctx.fillStyle='rgba(255,60,60,.6)';
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Goal crease arcs (dashed semicircles in front of each goal) ──
  const creaseR=toS(14,COURT_H/2).sx-cr.x;
  ctx.save();
  ctx.strokeStyle='rgba(80,160,230,.55)'; ctx.lineWidth=1.5;
  ctx.setLineDash([4,7]); ctx.shadowColor='rgba(80,160,230,.3)'; ctx.shadowBlur=8;
  // Left crease: right half of circle centred on left wall
  ctx.beginPath(); ctx.arc(cr.x,cy,creaseR,-Math.PI/2,Math.PI/2); ctx.stroke();
  // Right crease: left half of circle centred on right wall
  ctx.beginPath(); ctx.arc(cr.x+cr.w,cy,creaseR,Math.PI/2,3*Math.PI/2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // ── Goal mouth visual ──
  const {sy:gTop}=toS(0,COURT_H/2-GOAL_HALF);
  const {sy:gBot}=toS(0,COURT_H/2+GOAL_HALF);
  const gH=gBot-gTop, gW=14;
  ctx.save();
  // Dark recessed slot
  ctx.fillStyle='#030508';
  ctx.fillRect(cr.x-gW,gTop,gW,gH);
  ctx.fillRect(cr.x+cr.w,gTop,gW,gH);
  // Red goal frame
  ctx.strokeStyle='#cc1111'; ctx.lineWidth=2;
  ctx.shadowColor='#ff2222'; ctx.shadowBlur=14;
  ctx.strokeRect(cr.x-gW,gTop,gW,gH);
  ctx.strokeRect(cr.x+cr.w,gTop,gW,gH);
  // Goal posts (bright corner dots)
  ctx.fillStyle='#ff3333'; ctx.shadowBlur=10;
  [gTop,gBot].forEach(gy=>{
    ctx.beginPath(); ctx.arc(cr.x,gy,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cr.x+cr.w,gy,4,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawNet(){
  // In air hockey there is no net — just the center line (already drawn in drawServiceLines)
  // Add a subtle full-width glow stripe at center x=50
  const t=toS(50,0), b=toS(50,COURT_H);
  ctx.save();
  ctx.strokeStyle='rgba(200,40,40,.7)'; ctx.lineWidth=3;
  ctx.shadowColor='#ff2222'; ctx.shadowBlur=20;
  ctx.beginPath(); ctx.moveTo(t.sx,t.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
  ctx.restore();
}

function drawShadows(){
  if(ball.ip){
    const {sx,sy}=toS(ball.x,ball.y);
    ctx.save(); ctx.fillStyle='rgba(0,10,40,.55)';
    ctx.beginPath(); ctx.arc(sx+3,sy+3,10,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  [p1R,p2R].forEach(r=>{
    const {sx,sy}=toS(r.x,r.y);
    ctx.save(); ctx.fillStyle='rgba(0,10,40,.35)';
    ctx.beginPath(); ctx.arc(sx+4,sy+4,18,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

function drawParts(){
  parts.forEach(p=>{
    const {sx,sy}=toS(p.x,p.y);
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.shadowColor=p.col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(sx,sy,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });
}

function drawRacket(r,col,pn){
  const {sx,sy}=toS(r.x,r.y);
  const H=canvas.height/dpr, sc=H/720;
  const hitT = pn===1 ? hitTimerP1 : hitTimerP2;
  const scale = 1 + hitT/10 * 0.35;   // impact pulse
  const ro=22*sc*scale;   // outer ring radius
  const ri=13*sc*scale;   // inner rubber radius
  const rh= 5*sc*scale;   // centre handle dome

  ctx.save();
  // Outer glow ring
  ctx.strokeStyle=col; ctx.lineWidth=4*sc;
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.shadowColor=col; ctx.shadowBlur=28;
  ctx.beginPath(); ctx.arc(sx,sy,ro,0,Math.PI*2);
  ctx.fill(); ctx.stroke();

  // Inner rubber pad
  ctx.shadowBlur=0; ctx.fillStyle='#1a1a28';
  ctx.beginPath(); ctx.arc(sx,sy,ri,0,Math.PI*2); ctx.fill();

  // Concentric grip rings
  ctx.strokeStyle=col; ctx.globalAlpha=.22; ctx.lineWidth=1.5*sc;
  ctx.beginPath(); ctx.arc(sx,sy,ri*.7,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx,sy,ri*.4,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1;

  // Centre handle dome
  ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(sx,sy,rh,0,Math.PI*2); ctx.fill();

  // Player label above pusher
  ctx.shadowBlur=0;
  ctx.font=`bold ${Math.max(10,Math.round(11*sc))}px system-ui`;
  ctx.fillStyle=col; ctx.textAlign='center'; ctx.globalAlpha=.85;
  ctx.fillText(pn===1?'P1':'AI', sx, sy-ro-5*sc);
  ctx.restore();
}

function drawBall(){
  const {sx,sy}=toS(ball.x,ball.y);
  const H=canvas.height/dpr, r=Math.max(7,H*.012);

  ctx.save();
  // Speed-haze aura
  ctx.fillStyle='rgba(60,100,220,.14)';
  ctx.beginPath(); ctx.arc(sx,sy,r*3,0,Math.PI*2); ctx.fill();
  // Puck body — dark flat cylinder
  ctx.fillStyle='#12182a';
  ctx.shadowColor='#5577ff'; ctx.shadowBlur=18;
  ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
  // Bevelled edge ring
  ctx.strokeStyle='#3355cc'; ctx.lineWidth=2.5;
  ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(sx,sy,r*.88,0,Math.PI*2); ctx.stroke();
  // Inner highlight ring
  ctx.strokeStyle='rgba(120,160,255,.5)'; ctx.lineWidth=1;
  ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(sx,sy,r*.5,0,Math.PI*2); ctx.stroke();
  // Centre glint
  ctx.fillStyle='rgba(180,210,255,.7)';
  ctx.beginPath(); ctx.arc(sx-r*.25,sy-r*.28,r*.18,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawFlash(W,H){
  if(flash>0){
    ctx.fillStyle=`rgba(255,255,255,${flash/75*.2})`;
    ctx.fillRect(0,0,W,H);
    flash=Math.max(0,flash-16);
  }
}

function drawIdleBall(ts){
  const t=ts/1000;
  // Puck drifts across table in a figure-8 path
  const bx=50+Math.sin(t*.55)*30, by=25+Math.sin(t*1.1)*11;
  const {sx,sy}=toS(bx,by);
  ctx.save();
  ctx.fillStyle='rgba(50,80,200,.18)';
  ctx.beginPath(); ctx.arc(sx,sy,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#12182a'; ctx.shadowColor='#4466dd'; ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(sx,sy,9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#3355cc'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(sx,sy,7.5,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════
// §11  UI SCREENS
// ══════════════════════════════════════════════════════════════════

function showScr(name){
  appState=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('screen-'+name);
  if(el) el.classList.add('active');
  document.getElementById('hud').classList.toggle('visible', name==='game');
}

function updHUD(){
  document.getElementById('hud-p1').textContent=score[0];
  document.getElementById('hud-p2').textContent=score[1];
  const difficultyLabel = aiDifficulty==='easy'? 'קל' : aiDifficulty==='medium'? 'בינוני' : 'קשה';
  const info = dc?.open ? 'הוקי אוויר — דו-משתתפים' : (isHost ? `AI: ${difficultyLabel}` : 'ממתין…');
  document.getElementById('hud-info').textContent=info;
}

function showGO(w,s){
  appState='gameover';
  document.querySelectorAll('.screen').forEach(sc=>sc.classList.remove('active'));
  document.getElementById('screen-gameover').classList.add('active');
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('go-title').textContent=
    w===1?'🥅 שחקן 1 מנצח!':'🥅 שחקן 2 מנצח!';
  document.getElementById('go-score').textContent=s[0]+' : '+s[1];
  document.getElementById('go-sub').textContent=
    w===(myRole==='p1'?1:2)?'מעולה — ניצחת!':'משחק טוב — נסה שוב!';
}

// ══════════════════════════════════════════════════════════════════
// §12  GAME LOOP
// ══════════════════════════════════════════════════════════════════

function initCanvas(){
  canvas=document.getElementById('c');
  ctx=canvas.getContext('2d');
  resize(); initCrowd(); window.addEventListener('resize',resize);
}

function resize(){
  dpr=window.devicePixelRatio||1;
  canvas.width=window.innerWidth*dpr; canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initCrowd();
}

function doStart(){
  showScr('game');
  score=[0,0]; rally=0; ball.ip=false; ball.spd=BALL_SPD0;
  parts.length=0; flash=0; serving=1;
  aiUpdateT = 0; aiTargetX = 50; aiTargetY = 25;
  updHUD();
  if(isHost){ startSync(); setTimeout(serveBall, SERVE_DELAY); }
}

function loop(ts){
  raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-(lt||ts))/1000,.05);
  lt=ts;
  crowdTick += dt*2;

  if(appState==='game'){
    if(isHost){ updBall(dt); updParts(dt); updAI(dt); }
    hitTimerP1 = Math.max(0, hitTimerP1 - dt*60);
    hitTimerP2 = Math.max(0, hitTimerP2 - dt*60);
    render(ts);
  } else if(appState==='calib'){
    render(ts);
    drawCalibOverlay();
  } else {
    render(ts);
  }
}

// ── Mouse / touch fallback ──
window.addEventListener('mousemove',e=>{
  if(appState!=='game'||cState!=='LOCKED') return;
  const r=canvas.getBoundingClientRect();
  ptrToRacket((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height);
});
window.addEventListener('touchmove',e=>{
  if(appState!=='game'||cState!=='LOCKED') return;
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  ptrToRacket((t.clientX-r.left)/r.width,(t.clientY-r.top)/r.height);
},{passive:false});

// ── Boot ──
window.addEventListener('load',()=>{
  initCanvas(); initAC();
  raf=requestAnimationFrame(loop);

  document.getElementById('btn-create').addEventListener('click',createRoom);
  document.getElementById('btn-join').addEventListener('click',joinRoom);
  document.getElementById('join-input').addEventListener('keydown',e=>{
    if(e.key==='Enter') joinRoom();
    document.getElementById('lobby-error').textContent='';
  });

  document.getElementById('btn-solo').addEventListener('click',()=>{
    wakeAC(); isHost=true; myRole='p1';
    showScr('difficulty');
  });

  document.getElementById('btn-easy').addEventListener('click',()=>{
    aiDifficulty='easy'; showScr('calib'); initMP();
  });
  document.getElementById('btn-medium').addEventListener('click',()=>{
    aiDifficulty='medium'; showScr('calib'); initMP();
  });
  document.getElementById('btn-hard').addEventListener('click',()=>{
    aiDifficulty='hard'; showScr('calib'); initMP();
  });

  document.getElementById('btn-skip-calib').addEventListener('click',()=>{
    wakeAC(); cState='LOCKED'; onLocked();
  });

  document.getElementById('btn-replay').addEventListener('click',()=>{
    wakeAC();
    clearInterval(syncTimer); syncTimer=null;
    if(mpCam) mpCam.stop().catch(()=>{});
    if(peer){ peer.destroy(); peer=null; } dc=null;
    score=[0,0]; ball.ip=false; parts.length=0;
    cState='WAITING'; cProg=0; guestReady=false; flash=0;
    mpHands=null; mpCam=null; hx=.5; hy=.5; hvx=0; hvy=0;
    document.getElementById('room-display').style.display='none';
    document.getElementById('btn-skip-calib').style.display='';
    lobSt(''); lobErr(''); connSt('');
    showScr('lobby');
  });
});
</script>
